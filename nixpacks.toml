# Nixpacks config สำหรับ Railway (ทั้ง monorepo)
# Railway service จะ override buildCommand/startCommand จาก apps/*/railway.json
# ไฟล์นี้ตั้ง Node + pnpm version ให้สอดคล้องกับ engines + packageManager ใน root package.json

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x"]

[phases.install]
cmds = ["corepack enable", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"
